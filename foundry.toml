[profile.default]
src = "src"
out = "out"
libs = ["lib"]
via_ir = true
# Optimizer OFF: Solidity IR bug with vm.roll() in tests (issues #4934, #1373, #8102)
# For production: FOUNDRY_PROFILE=production to enable optimizer (37% smaller contracts)
bytecode_hash = "none"
# osaka EVM enables P256 precompile at 0x100 for testing passkey signatures
evm_version = "osaka"
ignored_error_codes = ["unused-var"]
fs_permissions = [{ access = "read-write", path = "./script/config/" }, { access = "read-write", path = "./script/e2e/" }, { access = "read-write", path = "./script/" }]
extra_output_files = ["abi"]

# Production: optimizer enabled for 37% smaller contracts
# Usage: FOUNDRY_PROFILE=production forge script script/Deploy.s.sol --broadcast
[profile.production]
via_ir = true
optimizer = true
optimizer_runs = 200
bytecode_hash = "none"
evm_version = "cancun"

[rpc_endpoints]
# Testnets (public dRPC endpoints - no API key needed)
sepolia = "https://sepolia.drpc.org"
holesky = "https://holesky.drpc.org"
optimism-sepolia = "https://optimism-sepolia.drpc.org"
base-sepolia = "https://base-sepolia.drpc.org"
arbitrum-sepolia = "https://arbitrum-sepolia.drpc.org"
polygon-amoy = "https://polygon-amoy.drpc.org"
hoodi = "https://0xrpc.io/hoodi"

# Mainnets (public dRPC endpoints)
mainnet = "https://eth.drpc.org"
optimism = "https://optimism.drpc.org"
# Alchemy-backed default avoids the dRPC rate limiter that throttles fork tests
# and broadcast scripts. Fallback aliases below for when Alchemy is the bottleneck.
base = "https://base-mainnet.g.alchemy.com/v2/Rr57Q41YGfkxYkx0kZp3EOQs86HatGGE"
base-drpc = "https://base.drpc.org"
base-llama = "https://base.llamarpc.com"
base-public = "https://mainnet.base.org"
arbitrum = "https://arb1.arbitrum.io/rpc"
polygon = "https://polygon.drpc.org"
gnosis = "https://rpc.gnosischain.com"
gnosis-drpc = "https://gnosis.drpc.org"
gnosis-ankr = "https://rpc.ankr.com/gnosis"
gnosis-gateway = "https://rpc.gnosis.gateway.fm"

# Local development
local = "http://localhost:8545"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options

[fmt]
ignore = ["upgrades/**"]
